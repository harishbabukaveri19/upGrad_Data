<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <style>
        body {
            background-color:bisque;
            font-family:'Times New Roman', Times, serif;
            font-size: 18px;
            margin: 0;
        }

        h1 {
            text-align: center;
        }

        .A {
            background-color:goldenrod;
            padding: 10px;
        }

        .A .B {
            list-style: none;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        .A .B .C {
            margin: 0 15px;
        }

        .A .B .C a {
            color: white;
            text-decoration: none;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        @media (max-width: 576px) {
            body {
                background-color:teal;
                font-size: 14px;
            }

            .A .B {
                flex-direction: column;
                align-items: center;
            }

            .A .B .C {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <h1> HBK STORE</h1>
    <nav class="A">
        <ul class="B">
            <li class="C"><a href="#home">Home</a></li>
            <li class="C"><a href="#about">About</a></li>
            <li class="C"><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section>
        <h1>Welcome to our Page</h1>
        <p>This page changes layout and style on mobile screens.</p>
    </section>
</body>
</html>
