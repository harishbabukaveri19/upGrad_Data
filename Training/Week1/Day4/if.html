<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Statement</title>
</head>
<body>
  <script>
    let score = 60;
    if (score >= 90) {
      console.log("Grade A");
    } else if (score >= 75) {
      console.log("Grade B");
    } else if (score >= 50) {
      console.log("Grade C");
    } else {
      console.log("Fail");
    }
</script>
</body>
</html>
