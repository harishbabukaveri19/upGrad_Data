<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Evaluator</title>

    <style>
        h1{
            text-align: center;
        }

        body{
            background-color:pink;
        }
    </style>    
</head>
<body>
    <h1>Student Grade Evaluator</h1>
  <script>
    let score = prompt("Enter your Score:");
    score = Number(score);
    if (score >= 75) {
      console.log("Grade A");
      alert("Grade A");
    } 
    
    else if (score >= 60) {
      console.log("Grade B");
      alert("Grade B");
    } 
    
    else if (score >= 40) {
      console.log("Grade C");
      alert("Grade C");
    } 
    
    else {
      console.log("Fail");
      alert("Fail");
    }
</script>
</body>
</html>
