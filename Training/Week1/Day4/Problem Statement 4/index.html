<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal Simulator</title>

    <style>
        h1{
            text-align: center;
        }

        body{
            background-color: beige;
        }
    </style>
</head>
<body>
    <h1>Traffic Signal Simulator</h1>
    <script>
    let color=prompt("Enter your color:(Red/Yellow/Green)");
    switch (color) {
        case "red":
            console.log("Stop");
            break;

        case "yellow":
            console.log("Get Ready");
            break;

        case "green":
            console.log("Go");
            break;
            
        default:
            console.log("Invalid Color");
    }
    </script>
</body>
</html>
