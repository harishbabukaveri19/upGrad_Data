<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>
	<nav>
	<a href="index.html">Home</a> | 
	<a href="contact.html">Contact</a>
	</nav>
	
	<h3> Registration Form </h3>
	
	<form>
	<label>Name:</label>
	<input type="text" placeholder="Type your Name" required>
	<br><br>
	<label>Email:</label>
	<input type="email" placeholder="Type your Email Id" required>
	<br><br>
	<label>Password:</label>
	<input type="password" placeholder="Type your Password" required>
	<br><br>
	<label>Gender:</label>
	<input type="radio" name="Gender"> Male
	<input type="radio" name="Gender"> Female
	<br><br>
	<label for="Courses">Select Course:</label>
	<input type="text" id="Courses" name="Courses" list="Course">
	<datalist id="Course">
        <option value="Python">
		<option value="Java">
		<option value="HTML">
	</datalist>
	<br><br>
	<button type="submit">Submit</button>
	</form>
</body>
</html>
