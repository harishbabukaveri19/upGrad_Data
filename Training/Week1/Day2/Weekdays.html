<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Input</title>
</head>
<body>

    <h2>Select a Day</h2>

    <form>
        <label for="weekday">Weekdays</label><br><br>

        <input type="text" id="weekday" name="weekday" list="Weekdays">

        <datalist id="Weekdays">
            <option value="Sunday">
            <option value="Monday">
            <option value="Tuesday">
            <option value="Wednesday">
            <option value="Thursday">
            <option value="Friday">
			<option value="Saturday">
        </datalist>

        <br><br>
        <button type="submit">Submit</button>
    </form>

</body>
</html>
