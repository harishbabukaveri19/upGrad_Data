<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Card</title>

    <style>
        body {
            margin:0;
            display: flex;
            font-family: Arial, Helvetica, sans-serif;
            background-color: aquamarine;
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        .profile {
            background-color:beige;
            width: 350px;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
        }

        .role{
            font-size: 20px;
            font-weight:500;
            padding: 10px;
        }

        .description{
            font-family:sans-serif;
            font-size: 18px;
        }

        .contact {
            display: inline-block;
            padding: 12px 25px;
            background-color:gold;
            color: black;
            text-decoration:underline;
            font-weight: bold;
            border-radius: 8px;
        }

        .contact:hover {
            background-color:darkgoldenrod;
        }
    </style>
</head>
<body>
    <div class="profile">
    <h2>Kaveri Harish Babu</h2>
    <div class="role">DotNet Developer</div>
    <p class="description">
        I am a passionate and dedicated learner with a strong interest in technology and software development. 
        I am always eager to learn new concepts and grow in the IT field.
    </p>
    <a href="contact.html" class="contact">Contact</a>
    </div>
</body>
</html>
