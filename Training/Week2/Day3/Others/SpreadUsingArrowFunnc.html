<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Operator Using Arrow Function</title>
</head>
<body>
    <script>
        const numbers = [1,2,3];
        const addNumbers = (arr) => {
            return [...arr,4,5,6];
        };

        console.log(addNumbers(numbers));
    </script>
</body>
</html>
