<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>College Event Dashboard</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand" href="#">College Event Dashboard</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>

        </div>
    </nav>


    <!-- Dashboard Content -->
    <div class="container mt-5">

        <div class="d-flex justify-content-between mb-3">
            <h3>Event List</h3>

            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#eventModal">
                Add Event
            </button>

        </div>


        <!-- Event Table -->
        <div class="table-responsive">

            <table class="table table-bordered">

                <thead class="table-dark">
                    <tr>
                        <th>Event Name</th>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Description</th>
                    </tr>
                </thead>

                <tbody id="eventTable">

                    <tr>
                        <td>Tech Fest</td>
                        <td>2026-04-10</td>
                        <td>Auditorium</td>
                        <td>Technology exhibition</td>
                    </tr>

                    <tr>
                        <td>Coding Hackathon</td>
                        <td>2026-04-20</td>
                        <td>Computer Lab</td>
                        <td>24 hour coding challenge</td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>


    <!-- Modal -->
    <div class="modal fade" id="eventModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Event</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <form id="eventForm">

                        <div class="mb-3">
                            <label class="form-label">Event Name</label>
                            <input type="text" id="eventName" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Event Date</label>
                            <input type="date" id="eventDate" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" id="eventLocation" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="eventDescription" class="form-control"></textarea>
                        </div>

                        <button type="button" class="btn btn-primary" onclick="addEvent()">
                            Submit
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


    <!-- JavaScript -->
    <script>

        function addEvent() {

            let name = document.getElementById("eventName").value;
            let date = document.getElementById("eventDate").value;
            let location = document.getElementById("eventLocation").value;
            let desc = document.getElementById("eventDescription").value;

            if (name === "" || date === "" || location === "") {
                alert("Please fill all required fields");
                return;
            }

            let table = document.getElementById("eventTable");

            let row = `
<tr>
<td>${name}</td>
<td>${date}</td>
<td>${location}</td>
<td>${desc}</td>
</tr>
`;

            table.innerHTML += row;

            // clear form
            document.getElementById("eventForm").reset();

            // close modal
            let modal = bootstrap.Modal.getInstance(document.getElementById('eventModal'));
            modal.hide();

        }

    </script>

</body>

</html>
